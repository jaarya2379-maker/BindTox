version: "3.8"

services:
  backend:
    build: .
    command: ["uvicorn", "bindtox.backend_api:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  ui:
    build: .
    command: ["streamlit", "run", "streamlit_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    environment:
      - BINDTOX_API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
